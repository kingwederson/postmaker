<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Personalizado - @duyane_marine</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .post-container {
      width: 1080px;
      height: 1080px;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), 
                  url('./square-insaturate.png') center/cover no-repeat;
      background-color: #1a1a1a;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      transition: all 0.4s ease;
    }

    /* Overlay com cor ajustável via CSS */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(20, 30, 60, 0.65), rgba(80, 20, 40, 0.55));
      transition: background 0.5s ease;
    }

    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 80px 100px;
      color: white;
    }

    .logo-instagram {
      position: absolute;
      top: 50px;
      right: 50px;
      color: white;
      font-size: 28px;
      opacity: 0.9;
    }

    .username {
      font-family: 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 40px;
      letter-spacing: 2px;
      opacity: 0.95;
    }

    .message {
      font-family: 'Playfair Display', serif;
      font-size: 68px;
      line-height: 1.15;
      font-weight: 700;
      margin-bottom: 60px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .highlight {
      color: #ffd700;
      position: relative;
    }

    .footer {
      position: absolute;
      bottom: 60px;
      left: 0;
      right: 0;
      text-align: center;
    }

    .footer-text {
      font-size: 24px;
      opacity: 0.85;
      font-weight: 500;
    }

    /* Controles de edição */
    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      padding: 15px 30px;
      border-radius: 50px;
      display: flex;
      gap: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 100;
    }

    button, input[type="color"] {
      padding: 12px 20px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button {
      background: #fff;
      color: #000;
      font-weight: 600;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .download-btn {
      background: #e1306c;
      color: white;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="post-container" id="post">
    <div class="overlay" id="overlay"></div>
    
    <div class="content">
      <div class="logo-instagram">📷</div>
      
      <div class="username">@duyane_marine</div>
      
      <div class="message" id="message">
        As vezes quando alguém nos chama de louco é porque sua vaidade não permite que se reconheça a nossa inteligência.
      </div>
      
      <div class="footer">
        <div class="footer-text">Conselho do Dia</div>
      </div>
    </div>
  </div>

  <!-- Controles -->
  <div class="controls">
    <input type="color" id="color1" value="#141e3c" title="Cor 1">
    <input type="color" id="color2" value="#501428" title="Cor 2">
    <button onclick="changeBackground()">Aplicar Cores</button>
    <button onclick="changeMessage()" style="background:#333;color:#fff">Editar Mensagem</button>
    <button class="download-btn" onclick="downloadImage()">Baixar como PNG</button>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    // Função para mudar o gradiente de cor
    function changeBackground() {
      const color1 = document.getElementById('color1').value;
      const color2 = document.getElementById('color2').value;
      const overlay = document.getElementById('overlay');
      
      overlay.style.background = `linear-gradient(135deg, ${color1}cc, ${color2}cc)`;
    }

    // Função para editar a mensagem
    function changeMessage() {
      const currentMsg = document.getElementById('message').innerHTML;
      const newMsg = prompt("Digite a nova mensagem (use <br> para quebra de linha):", 
        currentMsg.replace(/<br>/g, '\n'));
      
      if (newMsg !== null) {
        document.getElementById('message').innerHTML = newMsg.replace(/\n/g, '<br>');
      }
    }

    // Função para baixar a imagem
    async function downloadImage() {
      const post = document.getElementById('post');
      const originalBorderRadius = post.style.borderRadius;
      
      // Remove bordas arredondadas para melhor qualidade no Instagram
      post.style.borderRadius = '0';
      
      try {
        const canvas = await html2canvas(post, {
          scale: 2,           // Alta qualidade
          useCORS: true,
          backgroundColor: null,
          logging: false
        });

        // Criar link de download
        const link = document.createElement('a');
        link.download = `@duyane_marine_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        alert('Imagem baixada com sucesso! ✅');
      } catch (error) {
        alert('Erro ao gerar imagem. Tente novamente.');
        console.error(error);
      }
      
      // Restaura borda arredondada
      post.style.borderRadius = originalBorderRadius;
    }

    // Atalho de teclado (Ctrl + Enter) para baixar
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') {
        downloadImage();
      }
    });
  </script>
</body>
</html>
